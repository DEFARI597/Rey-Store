<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReyyStore - Top Up Games</title>
    <link rel="stylesheet" href="./styles/home.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-left">
          <img src="./img/reyy_logo.png" />
          <ul class="nav-menu">
            <li><a href="#" class="active">Topup</a></li>
            <li><a href="#">Cek Transaksi</a></li>
          </ul>
        </div>

        <div class="nav-search">
          <input type="text" placeholder="Cari Game..." />
        </div>

        <div class="nav-right">
          <div class="lang-selector">
            <img src="https://flagcdn.com/w20/id.png" alt="ID" />
            <span>ID / IDR</span>
          </div>
        </div>
      </div>
    </nav>

    <main class="content">
      <section class="hero-section">
        <div class="banner">
          <img src="./img/section_banner.png" />
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <h3>TRENDING</h3>
          <p>Berikut adalah beberapa produk yang paling populer saat ini</p>
        </div>
        <div class="grid-trending">
          <div class="card-wide">
            <img src="./img/ff_card.jpeg" />
            <div class="card-info-bottom">
              <span>Free Fire</span>
              <span class="sub">Garena</span>
            </div>
          </div>
          <div class="card-wide">
            <img src="./img/pubg_card.jpeg" />
            <div class="card-info-bottom">
              <span>Pubg Mobile</span>
              <span class="sub">Tencent Games</span>
            </div>
          </div>
          <div class="card-wide">
            <div class="card-info-bottom">
              <span>Mobile Legends</span>
              <span class="sub">Moonton</span>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="category-pill">Top Up Games</div>
        <div class="grid-games">
          <div class="game-card">
            <div class="game-img"></div>
            <div class="game-label">
              <p class="title">Free Fire</p>
              <p class="dev">Garena</p>
            </div>
          </div>
          <div class="game-card">
            <div class="game-img"></div>
            <div class="game-label">
              <p class="title">PUBG Mobile</p>
              <p class="dev">Tencent</p>
            </div>
          </div>
          <div class="game-card">
            <div class="game-img"></div>
            <div class="game-label">
              <p class="title">Mobile Legends</p>
              <p class="dev">Moonton</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
