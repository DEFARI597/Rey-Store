<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Konfirmasi Pesanan</title>
    <link rel="stylesheet" href="../styles/order.css" />
  </head>
  <body>
    <div class="modal-container">
      <div class="icon-wrapper">
        <div class="particle p-star-1">★</div>
        <div class="particle p-dot-1"></div>
        <div class="particle p-star-2">★</div>
        <div class="particle p-dot-2"></div>

        <div class="check-circle">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
      </div>

      <h2 class="modal-title">Buat Pesanan</h2>
      <p class="modal-subtitle">
        Pastikan data akun Kamu dan produk yang Kamu pilih valid dan sesuai.
      </p>

      <div class="order-details-card">
        <div class="details-grid">
          <div class="detail-label">Username</div>
          <div class="detail-value">reyy ganteng</div>

          <div class="detail-label">ID</div>
          <div class="detail-value">2702043171</div>

          <div class="detail-label">Item</div>
          <div class="detail-value">100 Diamonds</div>

          <div class="detail-label">Product</div>
          <div class="detail-value">Mobile Legends</div>

          <div class="detail-label">Payment</div>
          <div class="detail-value">QRIS (All Payment)</div>
        </div>
      </div>

      <div class="modal-actions">
        <a
          href="../payments/mobileLegendsPage.html"
          class="btn btn-confirm"
          style="
            text-decoration: none;
            text-align: center;
            display: inline-block;
          "
          >Pesan Sekarang!</a
        >

        <a
          href="../details/mobileLegendsPage.html"
          class="btn btn-cancel"
          style="
            text-decoration: none;
            text-align: center;
            display: inline-block;
          "
          >Batalkan</a
        >
      </div>
    </div>
  </body>
</html>
